<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>vLLM Chat — DeepSeek-R1-Distill-Qwen-7B (chamber-agent-test)</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --txt:#e6e9ef; --muted:#8b93a7;
          --accent:#5b8cff; --user:#1f6feb; --asst:#222936; --err:#ff6b6b;
          --think-bg:#13161d; --think-line:#37506b; --think-txt:#9aa3b5; --code-bg:#0b0d12; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { background:var(--bg); color:var(--txt); font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         display:flex; flex-direction:column; }
  header { background:var(--panel); border-bottom:1px solid var(--line); padding:10px 16px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  h1 { font-size:14px; margin:0 12px 0 0; font-weight:600; }
  label { font-size:12px; color:var(--muted); }
  input, textarea, select, button { font:inherit; color:var(--txt); background:var(--bg);
         border:1px solid var(--line); border-radius:8px; padding:7px 10px; }
  input[type=text]{ min-width:230px; }
  input.small{ width:84px; min-width:0; }
  input[type=checkbox]{ vertical-align:middle; }
  button { background:var(--accent); border-color:var(--accent); color:#fff; cursor:pointer; font-weight:600; }
  button.ghost { background:transparent; color:var(--muted); border-color:var(--line); font-weight:500; }
  button:disabled { opacity:.5; cursor:default; }
  #status { font-size:12px; color:var(--muted); margin-left:auto; }
  #chat { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:14px; max-width:920px; width:100%; margin:0 auto; }
  .msg { display:flex; gap:10px; }
  .msg .who { font-size:11px; color:var(--muted); width:64px; flex:0 0 64px; text-align:right; padding-top:8px; text-transform:uppercase; letter-spacing:.04em; }
  .col { min-width:0; display:flex; flex-direction:column; gap:6px; max-width:780px; }
  .bubble { padding:10px 14px; border-radius:12px; word-wrap:break-word; overflow-wrap:anywhere; }
  .user .bubble { background:var(--user); white-space:pre-wrap; }
  .assistant .bubble { background:var(--asst); border:1px solid var(--line); }
  .system .bubble { background:transparent; border:1px dashed var(--line); color:var(--muted); font-style:italic; white-space:pre-wrap; }
  .answer.streaming::after { content:'▍'; color:var(--muted); animation:blink 1.1s step-start infinite; }
  @keyframes blink { 50% { opacity:0; } }

  /* thinking panel */
  .think { border:1px solid var(--line); border-left:3px solid var(--think-line); background:var(--think-bg);
           border-radius:8px; font-size:13px; color:var(--think-txt); }
  body.hide-think .think { display:none; }
  .think > summary { cursor:pointer; list-style:none; padding:7px 12px; display:flex; align-items:center; gap:8px;
           font-weight:500; color:var(--muted); user-select:none; }
  .think > summary::-webkit-details-marker { display:none; }
  .think > summary:hover { color:var(--txt); }
  .think .chev { margin-left:auto; transition:transform .15s ease; opacity:.6; }
  .think[open] .chev { transform:rotate(90deg); }
  .think .icon.pulse { animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:.45; } 50% { opacity:1; } }
  .think .body { padding:2px 12px 10px 12px; white-space:pre-wrap; user-select:none;
           font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; line-height:1.5;
           color:var(--think-txt); max-height:320px; overflow:auto; }

  /* markdown in answer */
  .answer p { margin:0 0 8px; } .answer p:last-child { margin-bottom:0; }
  .answer h2,.answer h3,.answer h4 { margin:10px 0 6px; line-height:1.3; }
  .answer h2 { font-size:1.2em; } .answer h3 { font-size:1.1em; } .answer h4 { font-size:1em; }
  .answer ul,.answer ol { margin:4px 0 8px; padding-left:22px; } .answer li { margin:2px 0; }
  .answer code { background:var(--code-bg); border:1px solid var(--line); border-radius:4px; padding:1px 5px; font-family:ui-monospace,Menlo,monospace; font-size:.9em; }
  .answer pre.codeblock { background:var(--code-bg); border:1px solid var(--line); border-radius:8px; margin:8px 0; overflow:hidden; }
  .answer pre.codeblock .codebar { display:flex; align-items:center; justify-content:space-between; padding:5px 10px; border-bottom:1px solid var(--line); background:#0e1117; }
  .answer pre.codeblock .lang { font-size:11px; color:var(--muted); text-transform:lowercase; }
  .answer pre.codeblock code { display:block; background:none; border:none; padding:12px; overflow-x:auto; white-space:pre; }
  .answer a { color:var(--accent); }
  .answer blockquote { margin:6px 0; padding:2px 12px; border-left:3px solid var(--line); color:var(--muted); }
  .answer hr { border:none; border-top:1px solid var(--line); margin:10px 0; }
  .copybtn { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:6px; padding:2px 8px; font-size:11px; font-weight:500; cursor:pointer; }
  .copybtn:hover { color:var(--txt); }

  .meta { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:10px; }
  .meta .spacer { flex:1; }
  .err { color:var(--err); }
  footer { background:var(--panel); border-top:1px solid var(--line); padding:12px 16px; }
  .composer { display:flex; gap:8px; max-width:920px; margin:0 auto; }
  #prompt { flex:1; resize:none; min-height:46px; max-height:200px; }
  details.params summary { cursor:pointer; color:var(--muted); font-size:12px; }
  .params { margin-top:8px; }
</style>
</head>
<body>
<header>
  <div class="row">
    <h1>vLLM Chat</h1>
    <label>Endpoint <input type="text" id="endpoint" value=""></label>
    <label>Model <input type="text" id="model" value="deepseek-r1-distill-qwen-7b"></label>
    <span id="status">ready</span>
  </div>
  <details class="params">
    <summary>parameters &amp; system prompt</summary>
    <div class="row" style="margin-top:8px">
      <label>temp <input class="small" type="number" id="temp" value="0.6" step="0.1" min="0" max="2"></label>
      <label>max_tokens <input class="small" type="number" id="maxtok" value="8192" step="256" min="1" max="32768"></label>
      <label>top_p <input class="small" type="number" id="topp" value="0.95" step="0.05" min="0" max="1"></label>
      <label><input type="checkbox" id="showthink" checked> show reasoning</label>
      <label style="flex:1; min-width:260px">system
        <input type="text" id="system" style="width:100%" value="" placeholder="(optional system prompt)"></label>
      <button class="ghost" id="clear" type="button">clear chat</button>
    </div>
  </details>
</header>

<div id="chat"></div>

<footer>
  <div class="composer">
    <textarea id="prompt" placeholder="Type a message…  (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send" type="button">Send</button>
    <button id="stop" class="ghost" type="button" disabled>Stop</button>
  </div>
</footer>

<script>
const $ = id => document.getElementById(id);
const chat = $('chat');
let history = [];          // [{role, content}] — assistant entries hold ANSWER only (no <think>)
let controller = null;

// ---- endpoint auto-targets the host this page is served from (file:// fallback) ----
(function(){ const h=(location.hostname && location.hostname!=='')?location.hostname:'34.9.64.32';
  $('endpoint').value='http://'+h+':8003/v1'; })();

// ---- persisted prefs ----
const LS = { thinkOpen:'vllmchat.thinkOpen', showThink:'vllmchat.showThink' };
if (localStorage.getItem(LS.showThink)==='0') { $('showthink').checked=false; document.body.classList.add('hide-think'); }
$('showthink').addEventListener('change', e=>{
  document.body.classList.toggle('hide-think', !e.target.checked);
  localStorage.setItem(LS.showThink, e.target.checked?'1':'0');
});

// ---- scroll-aware autoscroll (don't fight the user scrolling up) ----
let stick = true;
chat.addEventListener('scroll', ()=>{ stick = (chat.scrollHeight - chat.scrollTop - chat.clientHeight) < 60; });
const scrollIfStuck = ()=>{ if (stick) chat.scrollTop = chat.scrollHeight; };

// ---- tiny, escape-first markdown renderer (XSS-safe, no deps) ----
function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function inlineMd(s){
  s = escapeHtml(s);
  s = s.replace(/`([^`]+)`/g, (m,c)=>'<code>'+c+'</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, '$1<em>$2</em>');
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  s = s.replace(/\n/g, '<br>');
  return s;
}
function renderCode(b){
  return '<pre class="codeblock"><div class="codebar"><span class="lang">'+escapeHtml(b.lang||'text')+
         '</span><button class="copybtn" type="button">copy</button></div><code>'+
         escapeHtml(b.code.replace(/\n+$/,''))+'</code></pre>';
}
function renderMarkdown(src){
  const blocks=[];
  // closed fenced code blocks
  src = src.replace(/```([\w+.\-]*)\n?([\s\S]*?)```/g, (m,lang,code)=>{ blocks.push({lang,code}); return '␀'+(blocks.length-1)+'␀'; });
  // an unterminated fence (mid-stream)
  src = src.replace(/```([\w+.\-]*)\n?([\s\S]*)$/, (m,lang,code)=>{ blocks.push({lang,code}); return '␀'+(blocks.length-1)+'␀'; });
  const lines = src.split('\n'); const out=[]; let para=[]; let i=0;
  const flush=()=>{ if(para.length){ out.push('<p>'+inlineMd(para.join('\n'))+'</p>'); para=[]; } };
  while(i<lines.length){
    const ln=lines[i];
    let m;
    if((m=ln.match(/^␀(\d+)␀\s*$/))){ flush(); out.push(renderCode(blocks[+m[1]])); i++; continue; }
    if(/^\s*$/.test(ln)){ flush(); i++; continue; }
    if((m=ln.match(/^(#{1,4})\s+(.*)$/))){ flush(); const lvl=Math.min(m[1].length+1,4); out.push('<h'+lvl+'>'+inlineMd(m[2])+'</h'+lvl+'>'); i++; continue; }
    if(/^\s*([-*_])\1\1+\s*$/.test(ln)){ flush(); out.push('<hr>'); i++; continue; }
    if(/^\s*>\s?/.test(ln)){ flush(); const q=[]; while(i<lines.length && /^\s*>\s?/.test(lines[i])){ q.push(lines[i].replace(/^\s*>\s?/,'')); i++; } out.push('<blockquote>'+inlineMd(q.join('\n'))+'</blockquote>'); continue; }
    if(/^\s*[-*]\s+/.test(ln)){ flush(); const items=[]; while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ items.push('<li>'+inlineMd(lines[i].replace(/^\s*[-*]\s+/,''))+'</li>'); i++; } out.push('<ul>'+items.join('')+'</ul>'); continue; }
    if(/^\s*\d+\.\s+/.test(ln)){ flush(); const items=[]; while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ items.push('<li>'+inlineMd(lines[i].replace(/^\s*\d+\.\s+/,''))+'</li>'); i++; } out.push('<ol>'+items.join('')+'</ol>'); continue; }
    para.push(ln); i++;
  }
  flush();
  let html = out.join('\n');
  html = html.replace(/␀(\d+)␀/g, (m,k)=>renderCode(blocks[+k]));   // any stray placeholders
  return html;
}

// ---- streaming <think> splitter (handles tags split across chunks) ----
const OPEN='<think>', CLOSE='</think>';
function splitThink(raw){
  const trimmed = raw.replace(/^\s+/,'');
  if (trimmed.length < OPEN.length && OPEN.startsWith(trimmed))   // still forming the opening tag
    return { hasThink:true, thinking:'', answer:'', done:false };
  const oi = raw.indexOf(OPEN);
  if (oi === -1) return { hasThink:false, thinking:'', answer:raw, done:true };
  const after = raw.slice(oi + OPEN.length);
  const ci = after.indexOf(CLOSE);
  if (ci === -1) {                                                // still thinking; hold back a partial closing tag
    let think = after;
    for (let k=CLOSE.length-1; k>0; k--){ if (think.endsWith(CLOSE.slice(0,k))) { think = think.slice(0,-k); break; } }
    return { hasThink:true, thinking:think, answer:'', done:false };
  }
  return { hasThink:true, thinking:after.slice(0,ci), answer:after.slice(ci+CLOSE.length).replace(/^\n+/,''), done:true };
}

// ---- message DOM ----
function elx(tag, cls, txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
function addUser(text){
  const w=elx('div','msg user'); w.appendChild(elx('div','who','you'));
  const c=elx('div','col'); const b=elx('div','bubble'); b.textContent=text; c.appendChild(b); w.appendChild(c);
  chat.appendChild(w); stick=true; scrollIfStuck();
}
function addAssistant(){
  const w=elx('div','msg assistant'); w.appendChild(elx('div','who','assistant'));
  const col=elx('div','col');
  const think=document.createElement('details'); think.className='think'; think.style.display='none';
  const sum=document.createElement('summary');
  sum.innerHTML='<span class="icon pulse">💭</span><span class="lbl">Thinking…</span><span class="chev">›</span>';
  const body=elx('div','body'); think.appendChild(sum); think.appendChild(body);
  think.open = true;
  think.addEventListener('toggle', ()=>{ if (think.dataset.done) localStorage.setItem(LS.thinkOpen, think.open?'1':'0'); });
  const ans=elx('div','bubble answer'); ans.classList.add('streaming');
  const meta=elx('div','meta');
  col.appendChild(think); col.appendChild(ans); col.appendChild(meta);
  w.appendChild(col); chat.appendChild(w); scrollIfStuck();
  return { think, sum, body, ans, meta };
}
function setStatus(s, err){ const e=$('status'); e.textContent=s; e.className=err?'err':''; }

async function send(){
  const text=$('prompt').value.trim(); if(!text) return;
  $('prompt').value=''; $('prompt').style.height='auto';
  $('send').disabled=true; $('stop').disabled=false;

  const sys=$('system').value.trim();
  if(history.length===0 && sys) history.push({role:'system', content:sys});
  history.push({role:'user', content:text});
  addUser(text);
  const a=addAssistant();

  const base=$('endpoint').value.replace(/\/+$/,'');
  const body={ model:$('model').value, messages:history, stream:true,
    temperature:parseFloat($('temp').value), max_tokens:parseInt($('maxtok').value,10),
    top_p:parseFloat($('topp').value), stream_options:{include_usage:true} };

  controller=new AbortController();
  const t0=performance.now();
  let raw='', firstMs=null, thinkStart=null, thinkSecs=null, usage=null, finishReason=null, parsed={thinking:'',answer:'',done:true,hasThink:false};

  const renderThink=()=>{
    if(!parsed.hasThink){ a.think.style.display='none'; return; }
    a.think.style.display='';
    a.body.textContent=parsed.thinking;
    if(thinkStart===null) thinkStart=performance.now();
    if(parsed.done && thinkSecs===null){
      thinkSecs=((performance.now()-thinkStart)/1000);
      a.sum.querySelector('.icon').classList.remove('pulse');
      a.sum.querySelector('.lbl').textContent = thinkSecs>=0.4 ? ('Thought for '+thinkSecs.toFixed(1)+'s') : 'Reasoning';
      a.think.dataset.done='1';
      a.think.open = localStorage.getItem(LS.thinkOpen)==='1';   // auto-collapse unless user prefers open
    }
  };

  try{
    setStatus('generating…');
    const resp=await fetch(base+'/chat/completions',{ method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer dummy'},
      body:JSON.stringify(body), signal:controller.signal });
    if(!resp.ok){ throw new Error('HTTP '+resp.status+': '+(await resp.text()).slice(0,300)); }
    const reader=resp.body.getReader(), dec=new TextDecoder(); let buf='';
    while(true){
      const {value,done}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n'); buf=parts.pop();
      for(const line of parts){
        const s=line.trim(); if(!s.startsWith('data:')) continue;
        const d=s.slice(5).trim(); if(d==='[DONE]') continue;
        let j; try{ j=JSON.parse(d); }catch{ continue; }
        if(j.usage) usage=j.usage;
        if(j.choices && j.choices[0] && j.choices[0].finish_reason) finishReason=j.choices[0].finish_reason;
        const delta=j.choices && j.choices[0] && j.choices[0].delta;
        if(delta && delta.content){
          if(firstMs===null){ firstMs=performance.now()-t0; setStatus('streaming…'); }
          raw+=delta.content;
          parsed=splitThink(raw);
          renderThink();
          a.ans.innerHTML=renderMarkdown(parsed.answer);
          scrollIfStuck();
        }
      }
    }
    parsed=splitThink(raw); renderThink();
    a.ans.classList.remove('streaming');
    a.ans.innerHTML=renderMarkdown(parsed.answer) || '<span style="color:var(--muted)">(no answer text)</span>';
    history.push({role:'assistant', content:(parsed.answer||raw).trim()});  // answer only, no <think>
    // meta + copy
    const totMs=performance.now()-t0;
    const bits=[(totMs/1000).toFixed(1)+'s'];
    if(firstMs!=null) bits.push('TTFT '+Math.round(firstMs)+'ms');
    if(usage){ bits.push(usage.completion_tokens+' out / '+usage.prompt_tokens+' in tok');
      if(usage.completion_tokens) bits.push((usage.completion_tokens/(totMs/1000)).toFixed(1)+' tok/s'); }
    a.meta.appendChild(elx('span',null,bits.join(' · ')));
    if(finishReason==='length') a.meta.appendChild(elx('span','err','⚠ truncated — hit max_tokens; raise it for longer reasoning'));
    a.meta.appendChild(elx('span','spacer'));
    const copy=elx('button','copybtn','copy'); copy.type='button';
    copy.addEventListener('click',()=>{ navigator.clipboard.writeText(parsed.answer||raw); copy.textContent='copied'; setTimeout(()=>copy.textContent='copy',1200); });
    a.meta.appendChild(copy);
    setStatus('ready');
  }catch(e){
    a.ans.classList.remove('streaming');
    if(e.name==='AbortError'){ a.meta.appendChild(elx('span',null,'(stopped)')); setStatus('stopped'); }
    else{ a.ans.innerHTML += '<div class="err">⚠ '+escapeHtml(e.message)+'</div>'; setStatus('error', true); }
  }finally{
    controller=null; $('send').disabled=false; $('stop').disabled=true; $('prompt').focus();
  }
}

// per-code-block copy (event delegation)
chat.addEventListener('click', e=>{
  const btn=e.target.closest('pre.codeblock .copybtn'); if(!btn) return;
  const code=btn.closest('pre').querySelector('code');
  navigator.clipboard.writeText(code.textContent); btn.textContent='copied'; setTimeout(()=>btn.textContent='copy',1200);
});

$('send').addEventListener('click', send);
$('stop').addEventListener('click', ()=>{ if(controller) controller.abort(); });
$('clear').addEventListener('click', ()=>{ history=[]; chat.innerHTML=''; setStatus('ready'); });
$('prompt').addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
$('prompt').addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,200)+'px'; });
$('prompt').focus();
</script>
</body>
</html>
