services:
  distilbert:
    build: ./containers/distilbert
    ports:
      - "8001:8001"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://metrics-agent:4318
      - OTEL_SERVICE_NAME=distilbert
      - MODEL_CACHE_DIR=/models
      # Emit BOTH legacy and stable HTTP semconv. Stable adds http.route on
      # http.server.request.duration (templated route) which Chamber's
      # operation-key auto-detector prefers; legacy keeps existing
      # http.server.duration tile data flowing without regression.
      - OTEL_SEMCONV_STABILITY_OPT_IN=http/dup
      # Dual export: also send to chamber-agent-standalone on the host
      - CHAMBER_OTLP_ENDPOINT=http://host.docker.internal:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - distilbert-models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    depends_on:
      metrics-agent:
        condition: service_started

  resnet50:
    build: ./containers/resnet50
    ports:
      - "8002:8002"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://metrics-agent:4318
      - OTEL_SERVICE_NAME=resnet50
      - MODEL_CACHE_DIR=/models
      # Emit BOTH legacy and stable HTTP semconv (see distilbert section
      # above for rationale).
      - OTEL_SEMCONV_STABILITY_OPT_IN=http/dup
      # Dual export: also send to chamber-agent-standalone on the host
      - CHAMBER_OTLP_ENDPOINT=http://host.docker.internal:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - resnet50-models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    depends_on:
      metrics-agent:
        condition: service_started

  metrics-agent:
    build: ./containers/metrics-agent
    ports:
      - "8080:8080"
      - "4318:4318"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - INSTANCE_TYPE=g2-standard-4
      - CLOUD_PROVIDER=gcp
      - GPU_POLL_INTERVAL=5
      - PROMETHEUS_PORT=8080
      - OTLP_GRPC_PORT=4318
      - GPU_BACKEND=pynvml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    cap_add:
      - SYS_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      metrics-agent:
        condition: service_started

  webapp:
    build: ./containers/webapp
    ports:
      - "5001:5000"
    environment:
      # host.docker.internal resolves to the Docker host IP, where ports 8001/8002/9090 are mapped
      - GPU_VM_IP=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      distilbert:
        condition: service_started
      resnet50:
        condition: service_started
      prometheus:
        condition: service_started

  # vLLM serving Qwen2.5-0.5B-Instruct. Provides a real generative-LLM
  # workload so the Chamber Service Analytics dashboard's GenAI panels
  # (TTFT / ITL / Tokens / Queue depth / KV cache) populate with live data.
  # Pinned to L4 GPU memory limit to coexist with distilbert/resnet50.
  vllm:
    image: vllm/vllm-openai:v0.6.6.post1
    ports:
      - "8003:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - vllm-models:/root/.cache/huggingface
    command:
      - "--model"
      - "Qwen/Qwen2.5-0.5B-Instruct"
      - "--gpu-memory-utilization"
      - "0.20"  # leave headroom for distilbert + resnet50 sharing the L4
      - "--max-model-len"
      - "4096"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--disable-log-requests"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ipc: host  # vLLM needs host shared memory for tensor ops
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # first start downloads ~1GB of weights
    restart: unless-stopped

  # OTel Collector — bridges vLLM's Prometheus /metrics endpoint to the
  # chamber-standalone agent's OTLP gRPC receiver on the host. Sets
  # service.name=vllm-qwen (auto-derived from the prometheus job_name).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./containers/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      vllm:
        condition: service_started
    restart: unless-stopped

  # Light synthetic chat traffic so the dashboard panels show movement.
  # Sleeps a few seconds between requests to avoid pinning the GPU.
  vllm-load-gen:
    image: curlimages/curl:8.10.1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Wait for vllm to be ready before starting the loop.
        until curl -fsS http://vllm:8000/health > /dev/null 2>&1; do
          echo "waiting for vllm..."
          sleep 5
        done
        echo "vllm is up; starting traffic loop"
        while true; do
          curl -sS -X POST http://vllm:8000/v1/chat/completions \
            -H 'Content-Type: application/json' \
            -d '{"model":"Qwen/Qwen2.5-0.5B-Instruct","messages":[{"role":"user","content":"Tell me a one-sentence fact about GPUs."}],"max_tokens":80,"stream":false}' \
            > /dev/null
          sleep 4
        done
    depends_on:
      vllm:
        condition: service_started
    restart: unless-stopped

volumes:
  distilbert-models:
  resnet50-models:
  prometheus-data:
  vllm-models:
